<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgTD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF8F3"/>
      <stop offset="100%" stop-color="#E8E2D4"/>
    </linearGradient>
    <linearGradient id="metalTD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#44403C"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bgTD)"/>
  <!-- 扳手：從左上到右下 -->
  <g transform="translate(256 256) rotate(-45)">
    <g fill="url(#metalTD)">
      <!-- 扳手柄 -->
      <rect x="-16" y="-120" width="32" height="200" rx="8"/>
      <!-- 扳手頭（上） -->
      <path d="M -40 -140 L 40 -140 L 40 -90 L 20 -90 L 20 -115 L -20 -115 L -20 -90 L -40 -90 Z"/>
      <!-- 扳手尾端圓 -->
      <circle cx="0" cy="90" r="28"/>
      <circle cx="0" cy="90" r="12" fill="url(#bgTD)"/>
    </g>
  </g>
  <!-- 螺絲起子：從右上到左下 -->
  <g transform="translate(256 256) rotate(45)">
    <g>
      <!-- 起子柄 -->
      <rect x="-22" y="-30" width="44" height="130" rx="8" fill="#C9A14B"/>
      <!-- 握把細節 -->
      <line x1="-22" y1="10" x2="22" y2="10" stroke="#8B6F2E" stroke-width="1.5"/>
      <line x1="-22" y1="40" x2="22" y2="40" stroke="#8B6F2E" stroke-width="1.5"/>
      <line x1="-22" y1="70" x2="22" y2="70" stroke="#8B6F2E" stroke-width="1.5"/>
      <!-- 起子桿 -->
      <rect x="-6" y="-130" width="12" height="100" fill="url(#metalTD)"/>
      <!-- 起子頭 -->
      <path d="M -10 -140 L 10 -140 L 6 -130 L -6 -130 Z" fill="url(#metalTD)"/>
    </g>
  </g>
</svg>
